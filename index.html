<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400&display=swap" rel="stylesheet">
    <title>Calculator No Vibecoding</title>
</head>

<body>
    <div class="calculator">
        <div class="calculator_box">
            <div class="calculator_header">
                <h1>Calculator</h1>
            </div>

            <div class="calculator_resultdisplay">0</div>
            <div class="calculator_keys">
                <!-- Top Row Functions -->
                <button class="button function clear">C</button>
                <button class="button function">+/-</button>
                <button class="button function">%</button>
                <button class="button operator">÷</button>

                <!-- Numbers & Operators -->
                <button class="button number">7</button>
                <button class="button number">8</button>
                <button class="button number">9</button>
                <button class="button operator">X</button>

                <button class="button number">4</button>
                <button class="button number">5</button>
                <button class="button number">6</button>
                <button class="button operator">-</button>

                <button class="button number">1</button>
                <button class="button number">2</button>
                <button class="button number">3</button>
                <button class="button operator">+</button>

                <!-- Bottom Row (We keep a special class for zero because it spans 2 columns!) -->
                <button class="button number button_zero">0</button>
                <button class="button number decimal">.</button>
                <button class="button function equals">=</button>
            </div>
        </div>
    </div>
</body>

</html>
